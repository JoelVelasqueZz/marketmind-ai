services:
  - type: web
    name: track5-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: LLM_MODE
        value: mock
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
    disk:
      name: track5-data
      mountPath: /app/data
      sizeGB: 1
