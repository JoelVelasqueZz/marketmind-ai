services:
  - type: web
    name: track5-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # LLM_MODE y LLM_MODEL quedan como sync:false para que un futuro `git push`
      # no pise el valor que se configure a mano en el dashboard de Render
      # (ej. cambiar de mock a gemini para la demo).
      - key: LLM_MODE
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      # Postgres persistente (ej. Neon) en vez del SQLite efimero del contenedor.
      # Si se deja vacio, cae al SQLite por defecto definido en el Dockerfile.
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
